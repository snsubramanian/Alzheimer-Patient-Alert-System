{% extends '../Common/Home.html' %}
{% block content %}
<section class="food_section layout_padding-bottom" id="section-wrap">
    <div class="overlay"></div>
    <div class="container pt-5">
        <div class="heading_container heading_center pt-5">
            <h2 class="dark">Appointments</h2>
        </div>

        <div class="filters-content">
            <div class="row grid">
                {% for appointment in appointments %}
                    <div class="col-sm-4 col-lg-3 all medicine">
                        <div class="box appointments">
                            <div>
                                <div class="detail-box view-alert">
                                    <h5>{{ appointment.purpose }}</h5>
                                    <p>Time: {{ appointment.date|date:"d M Y" }}</p>
                                    <p>Date: {{ appointment.date|date:"H:i A" }}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>

{% endblock %}
